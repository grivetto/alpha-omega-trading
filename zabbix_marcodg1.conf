# Denaro Prod-V2 Zabbix Monitoring — MARCODG1 (ADA/EUR Trend Grid)
# Generated 2026-05-24

UserParameter=denaro.bot.status,echo 1
UserParameter=denaro.metrics,cd /home/marco/denaro && /home/marco/denaro/venv/bin/python3 zabbix_marcodg1_metric.py 2>/dev/null || echo '{"error":"metric_fail"}'
UserParameter=denaro.load.1m,cat /proc/loadavg | awk '{print $1}'
