<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-OMEGA-SIGMA | LIVE PERFORMANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        body { background-color: #020202; color: #fff; font-family: 'JetBrains Mono', monospace; }
        .hud-border { border: 1px solid rgba(59, 130, 246, 0.2); background: rgba(10, 10, 20, 0.8); }
        .glow-green { text-shadow: 0 0 10px #10b981; color: #10b981; }
        .glow-blue { text-shadow: 0 0 10px #3b82f6; color: #3b82f6; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="max-w-full mx-auto">
        <div class="flex justify-between items-end mb-8 border-b border-blue-900/30 pb-4">
            <div>
                <h1 class="text-4xl font-black orbitron italic text-blue-500">FLEET PERFORMANCE TRACKER</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.5em]">Real-Time Intersquad Trajectory Analytics</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase">Live Node Status</p>
                <p class="text-xl orbitron glow-green">SYNCHRONIZED</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
            <div class="hud-border p-6 rounded-lg">
                <p class="text-[10px] text-slate-500 mb-2 uppercase">Capitale Attuale</p>
                <p class="text-3xl orbitron" id="total-val">€0.00</p>
            </div>
            <div class="hud-border p-6 rounded-lg">
                <p class="text-[10px] text-slate-500 mb-2 uppercase">Andamento Profitto</p>
                <p class="text-3xl orbitron" id="profit-val">+0.00€</p>
            </div>
            <div class="hud-border p-6 rounded-lg">
                <p class="text-[10px] text-slate-500 mb-2 uppercase">Bitcoin Price</p>
                <p class="text-3xl orbitron glow-blue" id="btc-price">€0</p>
            </div>
            <div class="hud-border p-6 rounded-lg">
                <p class="text-[10px] text-slate-500 mb-2 uppercase">Fleet Nodes</p>
                <div id="bot-status-pills" class="flex flex-wrap gap-1 mt-2"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="hud-border p-8 rounded-lg min-h-[500px]">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-blue-400">Andamento Real-Time Valore Flotta (EUR)</h2>
                    <div class="flex gap-4 text-[10px] font-mono">
                        <span class="flex items-center gap-1"><span class="w-2 h-2 bg-blue-500"></span> Valore Portafoglio</span>
                    </div>
                </div>
                <div class="h-[450px]">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Valore Flotta (€)',
                    data: [],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.05)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#444', font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        async function updateData() {
            try {
                const res = await fetch('/fleet_stats.json?' + Date.now());
                const data = await res.json();
                
                if (data.metrics) {
                    document.getElementById('total-val').textContent = '€' + data.metrics.total_val.toFixed(2);
                    const profit = data.metrics.profit;
                    const pEl = document.getElementById('profit-val');
                    pEl.textContent = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "€";
                    pEl.className = "text-3xl orbitron " + (profit >= 0 ? "glow-green" : "text-red-500");
                    document.getElementById('btc-price').textContent = '€' + Math.round(data.metrics.btc_price);
                }

                if (data.history) {
                    chart.data.labels = data.history.map(h => h.time);
                    chart.data.datasets[0].data = data.history.map(h => h.val);
                    chart.update('none');
                }

                document.getElementById('bot-status-pills').innerHTML = data.bots.map(b => `
                    <div class="w-3 h-3 rounded-full ${b.status === 'ONLINE' ? 'bg-emerald-500 shadow-[0_0_5px_#10b981]' : 'bg-red-500'} " title="${b.name}"></div>
                `).join('');

            } catch (e) { console.error(e); }
        }

        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
