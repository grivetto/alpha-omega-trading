<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-FLEET COMMAND v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #030303; color: #f8fafc; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .glass-card {
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.9) 0%, rgba(10, 10, 10, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover { border-color: #3b82f6; transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.2); }
        .cyber-header { background: linear-gradient(90deg, #1e3a8a, #3b82f6, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-badge { font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .glow-text { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .bg-grid { background-image: radial-gradient(circle, #1e293b 1px, transparent 1px); background-size: 30px 30px; }
        .pulse-emerald { animation: pulse-green 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body class="bg-grid p-4 md:p-8">
    <div class="max-w-[1400px] mx-auto">
        <!-- Top Stats Bar -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black cyber-header italic tracking-tight">ALPHA-FLEET : COMMAND CENTER</h1>
                <p class="text-slate-500 font-mono text-xs mt-2 uppercase tracking-widest">Global Status: <span class="text-blue-400 font-bold glow-text">GOD_MODE v2.0</span></p>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 w-full lg:w-auto">
                <div class="glass-card px-6 py-4 border-l-4 border-emerald-500">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">PROFITTO NETTO (TOT)</p>
                    <p class="text-3xl font-mono font-bold text-emerald-400" id="profit-val">+0.00€</p>
                </div>
                <div class="glass-card px-6 py-4 border-l-4 border-blue-500">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">VALORE TOTALE FLOTTA</p>
                    <p class="text-3xl font-mono font-bold text-white">€<span id="global-total">0.00</span></p>
                </div>
                <div class="glass-card px-6 py-4 border-l-4 border-slate-700 hidden md:block">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">CAPITALE VERSATO</p>
                    <p class="text-3xl font-mono font-bold text-slate-400">€722.00</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Main Systems Monitor -->
            <div class="lg:col-span-3 space-y-6">
                <!-- Bot Status Row -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="bot-grid">
                    <!-- Bots will be injected here -->
                </div>

                <!-- Main Chart -->
                <div class="glass-card p-6 min-h-[400px]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-blue-400 uppercase tracking-widest text-sm flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-blue-500 pulse-emerald"></span>
                            Bitcoin Performance Analytics (1m)
                        </h3>
                        <div class="text-[10px] font-mono text-slate-600 uppercase" id="last-update">Syncing...</div>
                    </div>
                    <div class="h-80">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar: Activity & Alerts -->
            <div class="space-y-6">
                <!-- Live Activity Feed -->
                <div class="glass-card p-6 h-full flex flex-col">
                    <h3 class="font-bold text-slate-400 uppercase tracking-widest text-sm mb-4">Tactical Log</h3>
                    <div id="activity-feed" class="font-mono text-[10px] space-y-3 overflow-y-auto flex-grow max-h-[600px] pr-2">
                        <div class="text-slate-700 italic">Initializing encrypted feed...</div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-white/5 text-[10px] text-blue-500 font-mono">
                        >> SCANNING 100 CRYPTO PAIRS...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Init Chart with high-res styling
        const ctx = document.getElementById('performanceChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'BTCEUR',
                    data: [],
                    borderColor: '#3b82f6',
                    borderWidth: 2,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#475569', font: { family: 'JetBrains Mono', size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#475569', font: { family: 'JetBrains Mono', size: 10 } } }
                },
                plugins: { legend: { display: false } }
            }
        });

        async function refreshDashboard() {
            try {
                // Fetch internal status
                const res = await fetch('/fleet_stats.json?' + Date.now());
                const data = await res.json();
                
                // Update Top Stats
                if (data.metrics) {
                    const total = data.metrics.total_val;
                    const profit = data.metrics.profit;
                    document.getElementById('global-total').textContent = total.toFixed(2);
                    const profitEl = document.getElementById('profit-val');
                    profitEl.textContent = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "€";
                    profitEl.className = "text-3xl font-mono font-bold " + (profit >= 0 ? "text-emerald-400" : "text-rose-400");
                }

                // Update Bot Grid
                const botGrid = document.getElementById('bot-grid');
                botGrid.innerHTML = data.bots.map(bot => `
                    <div class="glass-card p-4 border-t-2 ${bot.status === 'ONLINE' ? 'border-blue-500' : 'border-rose-500'}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black text-slate-500 uppercase">${bot.name}</span>
                            <span class="status-badge ${bot.status === 'ONLINE' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}">
                                ${bot.status}
                            </span>
                        </div>
                        <div class="font-mono text-xs text-slate-300">Uptime: ${bot.uptime}</div>
                        <div class="text-[8px] text-slate-600 mt-2 italic">Last: ${bot.last_ping}</div>
                    </div>
                `).join('');

                // Update Feed
                if (data.metrics && data.metrics.activity) {
                    const feed = document.getElementById('activity-feed');
                    feed.innerHTML = data.metrics.activity.map(a => `
                        <div class="flex gap-2 border-b border-white/5 pb-2">
                            <span class="text-slate-600">[${a.time}]</span>
                            <span class="text-blue-500 font-bold">${a.bot}</span>
                            <span class="text-slate-300">${a.action}</span>
                        </div>
                    `).join('');
                }

                // Chart Sync (Fetch price separately for faster updates)
                const p_res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
                const p_data = await p_res.json();
                const btc_price = parseFloat(p_data.price);
                
                const now = new Date().toLocaleTimeString();
                chart.data.labels.push(now);
                chart.data.datasets[0].data.push(btc_price);
                if (chart.data.labels.length > 50) {
                    chart.data.labels.shift();
                    chart.data.datasets[0].data.shift();
                }
                chart.update('none'); // Update without animation for performance
                document.getElementById('last-update').textContent = 'Live: ' + btc_price.toFixed(2) + ' EUR';

            } catch (e) { console.error("Monitor Sync Error:", e); }
        }

        setInterval(refreshDashboard, 5000);
        refreshDashboard();
    </script>
</body>
</html>
