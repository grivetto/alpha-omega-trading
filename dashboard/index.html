<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-OMEGA TWIN CORE | v12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@200;400;800&display=swap');
        body { background-color: #000; color: #fff; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .alpha-panel { border: 1px solid #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .omega-panel { border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.05); }
        .system-stat { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; }
        .glow-blue { color: #3b82f6; text-shadow: 0 0 10px #3b82f6; }
        .glow-red { color: #ef4444; text-shadow: 0 0 10px #ef4444; }
        .glow-green { color: #10b981; text-shadow: 0 0 10px #10b981; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-[2200px] mx-auto">
        
        <!-- DUAL CORE HEADER -->
        <div class="flex flex-col xl:flex-row justify-between items-center gap-10 mb-12 border-b border-white/10 pb-10">
            <div class="flex items-center gap-8">
                <div class="text-right">
                    <h2 class="text-4xl font-bold glow-blue italic" style="font-family: 'Syncopate';">ALPHA</h2>
                    <p class="text-[8px] text-blue-500 uppercase tracking-widest">Trend Following</p>
                </div>
                <div class="h-16 w-[1px] bg-white/20"></div>
                <div class="text-left">
                    <h2 class="text-4xl font-bold glow-red italic" style="font-family: 'Syncopate';">OMEGA</h2>
                    <p class="text-[8px] text-red-500 uppercase tracking-widest">Anti-Trend Reversal</p>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="alpha-panel p-5 rounded-lg border-l-4">
                    <p class="text-[8px] text-slate-500 mb-1 uppercase font-black">Net_Profit_Live</p>
                    <p class="system-stat glow-green" id="profit-val">+0.00€</p>
                </div>
                <div class="omega-panel p-5 rounded-lg border-l-4">
                    <p class="text-[8px] text-slate-500 mb-1 uppercase font-black">Total_Portfolio</p>
                    <p class="system-stat text-white">€<span id="global-total">0.00</span></p>
                </div>
                <div class="alpha-panel p-5 rounded-lg">
                    <p class="text-[8px] text-slate-500 mb-1 uppercase font-black">DNA_Gen</p>
                    <p class="system-stat text-blue-400" id="dna-gen">1</p>
                </div>
                <div class="omega-panel p-5 rounded-lg">
                    <p class="text-[8px] text-slate-500 mb-1 uppercase font-black">Active_Nodes</p>
                    <p class="system-stat text-red-400" id="active-count">0/10</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            
            <!-- ALPHA SYSTEMS -->
            <div class="xl:col-span-3 space-y-6">
                <h3 class="text-xs font-black text-blue-500 uppercase tracking-[0.3em] mb-4">Alpha Fleet Nodes</h3>
                <div id="alpha-list" class="grid grid-cols-1 gap-2"></div>
            </div>

            <!-- PERFORMANCE TRAJECTORY -->
            <div class="xl:col-span-6 space-y-8">
                <div class="alpha-panel p-8 rounded-xl bg-black/50">
                    <div class="h-[500px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="alpha-panel p-4 rounded-lg">
                        <h4 class="text-[10px] font-black text-blue-400 uppercase mb-4 tracking-widest italic">Asset Matrix</h4>
                        <div id="asset-list" class="text-[10px] space-y-2"></div>
                    </div>
                    <div class="omega-panel p-4 rounded-lg">
                        <h4 class="text-[10px] font-black text-red-400 uppercase mb-4 tracking-widest italic">Architect Intel</h4>
                        <div class="text-[9px] text-slate-500 space-y-2">
                            <div>> Dual-Engine Sync: OK</div>
                            <div>> OMEGA Protocol: Active</div>
                            <div>> Competitive Logic: Active</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- OMEGA SYSTEMS -->
            <div class="xl:col-span-3 space-y-6">
                <h3 class="text-xs font-black text-red-500 uppercase tracking-[0.3em] mb-4 text-right">Omega Fleet Nodes</h3>
                <div id="omega-list" class="grid grid-cols-1 gap-2 text-right"></div>
            </div>

        </div>
    </div>

    <script>
        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'VALUE', data: [], borderColor: '#3b82f6', borderWidth: 1, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', tension: 0.2, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#334', font: { size: 9 } } }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

        async function updatev12() {
            try {
                const res = await fetch('/fleet_stats.json?' + Date.now());
                const data = await res.json();
                
                if (data.metrics) {
                    document.getElementById('global-total').textContent = data.metrics.total_val.toFixed(2);
                    const profit = data.metrics.profit;
                    const pEl = document.getElementById('profit-val');
                    pEl.textContent = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "€";
                    pEl.className = "system-stat " + (profit >= 0 ? "glow-green" : "glow-red");
                    document.getElementById('dna-gen').textContent = data.metrics.dna_gen;

                    document.getElementById('asset-list').innerHTML = data.metrics.assets.map(a => `
                        <div class="flex justify-between border-b border-white/5 pb-1">
                            <span class="text-white font-bold">${a.name}</span>
                            <span class="text-blue-400 font-mono">€${a.val}</span>
                        </div>
                    `).join('');
                }

                const alphaNames = ["ALPHA-CORE", "ALPHA-SURGE", "ALPHA-HUNTER", "GRID-ENGINE", "MULTI-BOT", "VOL-HUNTER"];
                const omegaNames = ["OMEGA-CORE", "OMEGA-SHIELD", "OMEGA-FEEDER", "REB-SNIPER", "SIGMA-CHAOS", "BAIT-TRAP"];

                document.getElementById('alpha-list').innerHTML = data.bots.filter(b => alphaNames.includes(b.name)).map(b => `
                    <div class="alpha-panel p-2 rounded flex justify-between items-center border-l-2 border-blue-500">
                        <span class="text-[9px] font-black text-slate-400">${b.name}</span>
                        <span class="text-blue-400 font-bold text-[8px]">${b.status}</span>
                    </div>
                `).join('');

                document.getElementById('omega-list').innerHTML = data.bots.filter(b => omegaNames.includes(b.name)).map(b => `
                    <div class="omega-panel p-2 rounded flex justify-between items-center border-r-2 border-red-500 text-right">
                        <span class="text-red-400 font-bold text-[8px]">${b.status}</span>
                        <span class="text-[9px] font-black text-slate-400">${b.name}</span>
                    </div>
                `).join('');
                
                document.getElementById('active-count').textContent = data.bots.filter(b => b.status === 'ONLINE').length + "/10";

                if (data.history) {
                    chart.data.labels = data.history.map(h => h.time);
                    chart.data.datasets[0].data = data.history.map(h => h.val);
                    chart.update('none');
                }
            } catch (e) { }
        }
        setInterval(updatev12, 2500);
        updatev12();
    </script>
</body>
</html>
