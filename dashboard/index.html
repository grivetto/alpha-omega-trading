<!DOCTYPE html>
<html>
<head>
    <title>Trading Fleet Console - Stella 👩‍💻</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e11; color: #eaecef; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #fcd535; border-bottom: 2px solid #fcd535; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #1e2329; border-radius: 8px; padding: 15px; border-left: 5px solid #474d57; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card.online { border-left-color: #02c076; }
        .card.offline { border-left-color: #cf304a; opacity: 0.7; }
        .status-badge { float: right; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .online .status-badge { background: #02c076; color: white; }
        .offline .status-badge { background: #cf304a; color: white; }
        .bot-name { font-size: 1.2em; font-weight: bold; margin-bottom: 5px; color: #fcd535; }
        .bot-script { font-family: monospace; color: #848e9c; font-size: 0.9em; }
        .bot-time { font-size: 0.8em; color: #474d57; margin-top: 10px; }
        #stats-bar { background: #1e2329; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 1.5em; font-weight: bold; color: #02c076; }
        .stat-label { font-size: 0.8em; color: #848e9c; text-transform: uppercase; }
        .refresh-msg { font-size: 0.7em; color: #474d57; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>STELLA TRADING CONSOLE 👩‍💻</h1>
        
        <div id="stats-bar">
            <div class="stat-item">
                <div class="stat-label">Aggiornamento</div>
                <div id="last-update" class="stat-val">--:--:--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Bot Online</div>
                <div id="bots-online" class="stat-val">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Squadra</div>
                <div class="stat-val" style="color: #fcd535">PROTETTA 🛡️</div>
            </div>
        </div>

        <div id="fleet-grid" class="grid">
            <!-- Cards will be injected here -->
        </div>

        <div class="refresh-msg">Aggiornamento automatico ogni 15 secondi</div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/fleet_stats.json');
                const data = await response.json();
                
                document.getElementById('last-update').innerText = data.timestamp.split(' ')[1];
                
                const grid = document.getElementById('fleet-grid');
                grid.innerHTML = '';
                
                let onlineCount = 0;
                
                const bots = Object.entries(data.fleet).sort((a, b) => b[1].status.localeCompare(a[1].status));

                bots.forEach(([name, info]) => {
                    const isOnline = info.status === 'ONLINE';
                    if (isOnline) onlineCount++;
                    
                    const card = document.createElement('div');
                    card.className = `card ${info.status.toLowerCase()}`;
                    card.innerHTML = `
                        <span class="status-badge">${info.status}</span>
                        <div class="bot-name">${name}</div>
                        <div class="bot-script">${info.script}</div>
                        <div class="bot-time">Ultimo Check: ${info.last_seen}</div>
                    `;
                    grid.appendChild(card);
                });
                
                document.getElementById('bots-online').innerText = onlineCount;
            } catch (error) {
                console.error('Errore aggiornamento dashboard:', error);
            }
        }

        // Update immediately and then every 15s
        updateDashboard();
        setInterval(updateDashboard, 15000);
    </script>
</body>
</html>
