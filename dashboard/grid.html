<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Grid Trading Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            border: 1px solid #334155;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .header h1 { 
            font-size: 2.5em; 
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #94a3b8; font-size: 1.1em; }
        
        .dashboard-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .nav-btn {
            background: #1e293b;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #334155;
            transition: all 0.2s;
        }
        .nav-btn:hover, .nav-btn.active {
            background: #38bdf8;
            color: #fff;
            border-color: #38bdf8;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .summary-card .value { font-size: 2em; font-weight: 700; color: #f8fafc; }
        .summary-card .label { font-size: 0.85em; color: #94a3b8; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .positive { color: #10b981 !important; }
        .negative { color: #ef4444 !important; }
        .warning { color: #f59e0b !important; }

        .panels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .panel {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .panel h3 { color: #f8fafc; margin-bottom: 20px; font-size: 1.2em; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #94a3b8; font-size: 0.85em; text-transform: uppercase; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; color: #e2e8f0; font-size: 0.95em; }
        
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            display: inline-block;
        }
        .badge-buy { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-sell { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        .refresh-bar {
            text-align: center;
            margin-top: 30px;
            color: #64748b;
            font-size: 0.9em;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #38bdf8;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 900px) {
            .panels-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕸️ Grid Trading Bot Dashboard</h1>
            <p class="subtitle" id="subtitleText">Caricamento in corso...</p>
        </div>

        <div class="dashboard-nav">
            <a href="/" class="nav-btn">Multi-Coin Monitor</a>
            <a href="/grid" class="nav-btn active">Grid Trading Bot</a>
        </div>
        
        <div id="loading" style="text-align: center; padding: 50px; color: #94a3b8;">
            <div class="spinner"></div> Sincronizzazione con il Grid Bot...
        </div>

        <div id="content" style="display: none;">
            <div class="summary-grid" id="summaryGrid"></div>
            
            <div class="panels-grid">
                <div class="panel">
                    <h3>🟢 Ordini Attivi</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Livello</th>
                                    <th>Direzione</th>
                                    <th>Prezzo</th>
                                    <th>Quantità</th>
                                </tr>
                            </thead>
                            <tbody id="ordersBody"></tbody>
                        </table>
                    </div>
                </div>
                
                <div class="panel">
                    <h3>📜 Storico Esecuzioni</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ora</th>
                                    <th>Direzione</th>
                                    <th>Prezzo</th>
                                    <th>Quantità</th>
                                </tr>
                            </thead>
                            <tbody id="fillsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="refresh-bar">
            <span id="lastUpdate">Ultimo aggiornamento: --</span>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const res = await fetch('/grid_status.json?' + Date.now());
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    updateUI(data);
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
            setTimeout(fetchData, 5000);
        }

        function updateUI(data) {
            document.getElementById('subtitleText').innerHTML = 
                `Pair: <strong style="color:#fff;">${data.symbol}</strong> &bull; Prezzo Corrente: <strong style="color:#38bdf8;">€${data.current_price?.toLocaleString()}</strong>`;

            // Summary
            document.getElementById('summaryGrid').innerHTML = `
                <div class="summary-card">
                    <div class="value ${data.status === 'RUNNING' ? 'positive' : 'negative'}">${data.status}</div>
                    <div class="label">Stato</div>
                </div>
                <div class="summary-card">
                    <div class="value">${data.active_orders || 0}</div>
                    <div class="label">Ordini Attivi</div>
                </div>
                <div class="summary-card">
                    <div class="value ${data.net_profit >= 0 ? 'positive' : 'negative'}">€${(data.net_profit || 0).toFixed(4)}</div>
                    <div class="label">Profitto Netto</div>
                </div>
                <div class="summary-card">
                    <div class="value">€${(data.balance?.usdt || 0).toFixed(2)}</div>
                    <div class="label">Euro Liberi</div>
                </div>
            `;
            
            // Orders
            const orders = data.orders || [];
            const ordersBody = document.getElementById('ordersBody');
            if (orders.length === 0) {
                ordersBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #64748b;">Nessun ordine attivo</td></tr>';
            } else {
                ordersBody.innerHTML = orders.map(o => `
                    <tr>
                        <td style="color:#94a3b8;">#${o.level}</td>
                        <td><span class="badge ${o.direction === 'BUY' ? 'badge-buy' : 'badge-sell'}">${o.direction}</span></td>
                        <td style="font-weight:600;">€${o.price?.toLocaleString()}</td>
                        <td>${o.quantity?.toFixed(2)}</td>
                    </tr>
                `).join('');
            }
            
            // Fills
            const fills = data.fills || [];
            const fillsBody = document.getElementById('fillsBody');
            if (fills.length === 0) {
                fillsBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #64748b;">Nessuna esecuzione (in attesa)</td></tr>';
            } else {
                fillsBody.innerHTML = fills.slice(0, 10).map(f => `
                    <tr>
                        <td style="color:#94a3b8;">${f.time?.split('T')[1]?.substring(0, 8) || '-'}</td>
                        <td><span class="badge ${f.direction === 'BUY' ? 'badge-buy' : 'badge-sell'}">${f.direction}</span></td>
                        <td style="font-weight:600;">€${f.price?.toLocaleString()}</td>
                        <td>${f.quantity?.toFixed(2)}</td>
                    </tr>
                `).join('');
            }
            
            document.getElementById('lastUpdate').innerHTML = `<span style="color:#10b981;">●</span> Live (5s) | Ultimo aggiornamento: ${data.timestamp || new Date().toLocaleTimeString()}`;
        }
        
        fetchData();
    </script>
</body>
</html>
