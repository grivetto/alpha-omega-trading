UserParameter=denaro.bot.status,echo 1
UserParameter=denaro.metrics,cd /home/sergio/denaro && /home/sergio/denaro/venv/bin/python3 zabbix_nuvola_metric.py 2>/dev/null || echo '{"error":"metric_fail"}'
UserParameter=denaro.load.1m,cat /proc/loadavg | awk '{print $1}'
UserParameter=denaro.mem.pct,free -m | grep Mem | awk '{printf "%.0f", $3/$2 * 100}'
UserParameter=denaro.disk.pct,df / | tail -1 | awk '{print $5}' | tr -d '%'
UserParameter=denaro.bot.alive,ps aux | grep -c "nuvola_bot.py" || echo 0
