# ── SERVICE STATUS ──────────────────────────────────────────
UserParameter=denaro.v3.service.zabbix_agent,pgrep -f "zabbix_agentd" > /dev/null 2>&1 && echo 1 || echo 0

# ── V3 BOT STATUS ──────────────────────────────────────────
UserParameter=denaro.v3.bot.ada_grid,pgrep -f "denaro_v3.py.*ADA" > /dev/null 2>&1 && echo 1 || echo 0

# ── GRID BOT METRICS (from log) ────────────────────────────
UserParameter=denaro.v3.grid.ada.buys,python3 -c "
import re
try:
    with open('/home/sergio/denaro/denaro_v3.log') as f:
        lines = f.readlines()
    for line in reversed(lines[-50:]):
        m = re.search(r'Buys=(\d+)', line)
        if m:
            print(m.group(1))
            break
    else: print(0)
except: print(0)
" 2>/dev/null || echo 0

