# ── ADA PRICE ───────────────────────────────────────────────
UserParameter=denaro.v3.price.ada,python3 -c "import ccxt; print(ccxt.binance().fetch_ticker('ADA/EUR')['last'])" 2>/dev/null || echo 0

# ── OPEN ORDERS ─────────────────────────────────────────────
UserParameter=denaro.v3.orders.ada,python3 -c "
import ccxt, os
env = {}
with open('/home/sergio/denaro/.env') as f:
    for line in f:
        line = line.strip()
        if line and not line.startswith('#') and '=' in line:
            k, v = line.split('=', 1)
            env[k.strip()] = v.strip()
ex = ccxt.binance({'apiKey': env.get('BINANCE_API_KEY',''), 'secret': env.get('BINANCE_API_SECRET','')})
print(len(ex.fetch_open_orders('ADA/EUR')))
" 2>/dev/null || echo 0

# ── ERRORS IN LOG ───────────────────────────────────────────
UserParameter=denaro.v3.grid.ada.errors,python3 -c "
try:
    with open('/home/sergio/denaro/denaro_v3.log') as f:
        lines = f.readlines()
    errors = sum(1 for l in lines[-200:] if 'ERROR' in l)
    print(errors)
except: print(0)
" 2>/dev/null || echo 0

# ── SYSTEM HEALTH ───────────────────────────────────────────
UserParameter=denaro.v3.load.1m,cat /proc/loadavg | awk '{print $1}'
UserParameter=denaro.v3.mem.pct,free -m | grep Mem | awk '{printf "%.0f", $3/$2 * 100}'
UserParameter=denaro.v3.disk.pct,df / | tail -1 | awk '{print $5}' | tr -d '%'

# ── WATCHDOG ────────────────────────────────────────────────
UserParameter=denaro.v3.watchdog.all_ok,c=0; pgrep -f "denaro_v3.py.*ADA" > /dev/null 2>&1 && c=$((c+1)); pgrep -f "zabbix_agentd" > /dev/null 2>&1 && c=$((c+1)); echo $c
