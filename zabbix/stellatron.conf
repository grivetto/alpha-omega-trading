# ── SERVICE STATUS ──────────────────────────────────────────
UserParameter=stellatron.service.bot,python3 /home/sergio/denaro/zabbix_stellatron_metric.py running 2>/dev/null || echo 0
UserParameter=stellatron.service.zabbix_agent,pgrep -f zabbix_agentd > /dev/null 2>&1 && echo 1 || echo 0

# ── GRID METRICS (from stellatron.log) ──────────────────────
UserParameter=stellatron.grid.buys,python3 /home/sergio/denaro/zabbix_stellatron_metric.py buys 2>/dev/null || echo 0
UserParameter=stellatron.grid.sells,python3 /home/sergio/denaro/zabbix_stellatron_metric.py sells 2>/dev/null || echo 0
UserParameter=stellatron.grid.invested,python3 /home/sergio/denaro/zabbix_stellatron_metric.py invested 2>/dev/null || echo 0
UserParameter=stellatron.grid.profit,python3 /home/sergio/denaro/zabbix_stellatron_metric.py profit 2>/dev/null || echo 0
UserParameter=stellatron.grid.fills,python3 /home/sergio/denaro/zabbix_stellatron_metric.py fills 2>/dev/null || echo 0
UserParameter=stellatron.grid.eur_free,python3 /home/sergio/denaro/zabbix_stellatron_metric.py eur_free 2>/dev/null || echo 0
UserParameter=stellatron.grid.compound,python3 /home/sergio/denaro/zabbix_stellatron_metric.py compound 2>/dev/null || echo 1
UserParameter=stellatron.grid.errors,python3 /home/sergio/denaro/zabbix_stellatron_metric.py errors 2>/dev/null || echo 0
UserParameter=stellatron.grid.today_pnl,python3 /home/sergio/denaro/zabbix_stellatron_metric.py today_pnl 2>/dev/null || echo 0

# ── SYSTEM HEALTH ───────────────────────────────────────────
UserParameter=stellatron.load.1m,cat /proc/loadavg | awk '{print $1}'
UserParameter=stellatron.mem.pct,free -m | grep Mem | awk '{printf "%.0f", $3/$2 * 100}'
UserParameter=stellatron.disk.pct,df / | tail -1 | awk '{print $5}' | tr -d '%'

# ── WATCHDOG ────────────────────────────────────────────────
UserParameter=stellatron.watchdog.all_ok,c=0; python3 /home/sergio/denaro/zabbix_stellatron_metric.py running 2>/dev/null | grep -q 1 && c=$((c+1)); pgrep -f zabbix_agentd > /dev/null 2>&1 && c=$((c+1)); echo $c
