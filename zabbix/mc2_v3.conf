# ── BINANCE PORTFOLIO (via API) ────────────────────────────
UserParameter=denaro.v3.portfolio.eur,python3 -c "
import ccxt, os
env = {}
with open('/home/sergio/denaro/.env') as f:
    for line in f:
        line = line.strip()
        if line and not line.startswith('#') and '=' in line:
            k, v = line.split('=', 1)
            env[k.strip()] = v.strip()
ex = ccxt.binance({'apiKey': env.get('BINANCE_API_KEY',''), 'secret': env.get('BINANCE_API_SECRET','')})
bal = ex.fetch_balance()
print(round(bal.get('EUR',{}).get('free',0), 2))
" 2>/dev/null || echo 0

UserParameter=denaro.v3.portfolio.total,python3 -c "
import ccxt, os
env = {}
with open('/home/sergio/denaro/.env') as f:
    for line in f:
        line = line.strip()
        if line and not line.startswith('#') and '=' in line:
            k, v = line.split('=', 1)
            env[k.strip()] = v.strip()
ex = ccxt.binance({'apiKey': env.get('BINANCE_API_KEY',''), 'secret': env.get('BINANCE_API_SECRET','')})
bal = ex.fetch_balance()
total = bal.get('EUR',{}).get('total',0) or 0
for sym in ['BTC','ETH','SOL','ADA','BNB']:
    try:
        t = ex.fetch_ticker(sym+'/EUR')
        total += (bal.get(sym,{}).get('total',0) or 0) * t.get('last',0)
    except: pass
print(round(total, 2))
" 2>/dev/null || echo 0

