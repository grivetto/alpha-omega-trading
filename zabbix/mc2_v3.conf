# ── TRADES TODAY ────────────────────────────────────────────
UserParameter=denaro.v3.trades.today,python3 -c "
import sqlite3, os
db = '/home/sergio/denaro/trades.db'
if os.path.exists(db):
    c = sqlite3.connect(db)
    r = c.execute(\"SELECT COUNT(*) FROM trades WHERE date(exit_time)=date('now')\").fetchone()
    print(r[0] if r else 0)
    c.close()
else: print(0)
" 2>/dev/null || echo 0

