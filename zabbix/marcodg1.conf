# Denaro Zabbix Monitoring — MARCODG1 v2026-05-21

# ── SERVICE STATUS ──────────────────────────────────────────
UserParameter=denaro.service.grid,systemctl is-active denaro-grid.service 2>/dev/null || echo inactive
UserParameter=denaro.service.zabbix_agent,systemctl is-active zabbix-agent.service 2>/dev/null || echo inactive

# ── GRID BOT METRICS ────────────────────────────────────────
UserParameter=denaro.grid.price,/home/sergio/denaro/venv/bin/python3 -c "import ccxt; e=ccxt.binance(); t=e.fetch_ticker('ADA/EUR'); print(t['last'])" 2>/dev/null || echo 0
UserParameter=denaro.grid.config_range,/home/sergio/denaro/venv/bin/python3 -c "import json; c=json.load(open('/home/sergio/denaro/grid_config.json')); print(c.get('grid_range_pct',0))" 2>/dev/null || echo 0
UserParameter=denaro.grid.config_levels,/home/sergio/denaro/venv/bin/python3 -c "import json; c=json.load(open('/home/sergio/denaro/grid_config.json')); print(c.get('grid_levels',0))" 2>/dev/null || echo 0
UserParameter=denaro.grid.config_base_order,/home/sergio/denaro/venv/bin/python3 -c "import json; c=json.load(open('/home/sergio/denaro/grid_config.json')); print(c.get('base_order_eur',0))" 2>/dev/null || echo 0
UserParameter=denaro.grid.errors,journalctl -u denaro-grid --no-pager --since "1 hour ago" 2>/dev/null | grep -c "ERROR" || echo 0

# ── SYSTEM HEALTH ───────────────────────────────────────────
UserParameter=denaro.load.1m,cat /proc/loadavg | awk '{print $1}'
UserParameter=denaro.mem.pct,free -m | grep Mem | awk '{printf "%.0f", $3/$2 * 100}'
UserParameter=denaro.disk.pct,df / | tail -1 | awk '{print $5}' | tr -d '%'

# ── WATCHDOG ────────────────────────────────────────────────
UserParameter=denaro.watchdog.all_ok,c=0; for s in denaro-grid zabbix-agent; do systemctl is-active $s.service >/dev/null 2>&1 && c=$((c+1)); done; echo $c
