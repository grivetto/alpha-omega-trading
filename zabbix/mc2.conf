# Denaro Zabbix Monitoring — Clean Config v2026-05-21
# Only monitors ACTIVE services. Dead bots removed.

# ── SERVICE STATUS ──────────────────────────────────────────
UserParameter=denaro.service.squadra,systemctl is-active denaro-squadra.service 2>/dev/null || echo inactive
UserParameter=denaro.service.grid_xrp,systemctl is-active denaro-grid-xrp.service 2>/dev/null || echo inactive
UserParameter=denaro.service.dashboard,systemctl is-active denaro-dashboard.service 2>/dev/null || echo inactive
UserParameter=denaro.service.zabbix_agent,systemctl is-active zabbix-agent.service 2>/dev/null || echo inactive

# ── SQUADRA METRICS ─────────────────────────────────────────
UserParameter=denaro.squadra.portfolio,journalctl -u denaro-squadra --no-pager -n 500 --since "5 min ago" 2>/dev/null | grep -oP "Portfolio \| EUR=[0-9.]+ \+ Crypto=[0-9.]+ = [0-9.]+" | tail -1 | grep -oP "[0-9.]+€$" | tr -d "€" || echo 0
UserParameter=denaro.squadra.exposure,journalctl -u denaro-squadra --no-pager -n 200 --since "5 min ago" 2>/dev/null | grep -oP "Exposure=[0-9.]+" | tail -1 | grep -oP "[0-9.]+" || echo 0
UserParameter=denaro.squadra.drawdown,journalctl -u denaro-squadra --no-pager -n 200 --since "5 min ago" 2>/dev/null | grep -oP "Drawdown=[0-9.]+" | tail -1 | grep -oP "[0-9.]+" || echo 0
UserParameter=denaro.squadra.errors,journalctl -u denaro-squadra --no-pager -n 500 --since "1 hour ago" 2>/dev/null | grep -c "ERROR" | head -1 || echo 0

# ── TRADES TODAY ────────────────────────────────────────────
UserParameter=denaro.trades.today,python3 -c "import sqlite3; c=sqlite3.connect('/home/sergio/denaro/trades.db'); r=c.execute(\"SELECT COUNT(*) FROM trades WHERE date(exit_time)=date('now')\").fetchone(); print(r[0] if r else 0); c.close()" 2>/dev/null || echo 0

# ── SYSTEM HEALTH ───────────────────────────────────────────
UserParameter=denaro.load.1m,cat /proc/loadavg | awk '{print $1}'
UserParameter=denaro.mem.pct,free -m | grep Mem | awk '{printf "%.0f", $3/$2 * 100}'
UserParameter=denaro.disk.pct,df / | tail -1 | awk '{print $5}' | tr -d '%'

# ── WATCHDOG: all active services OK ────────────────────────
UserParameter=denaro.watchdog.all_ok,c=0; for s in denaro-squadra denaro-grid-xrp zabbix-agent; do systemctl is-active $s.service >/dev/null 2>&1 && c=$((c+1)); done; echo $c
